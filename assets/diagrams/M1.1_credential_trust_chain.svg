<svg viewBox="0 0 660 346" role="img" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="dgmArrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" class="dgm-arrow"/></marker></defs>
<rect x="0" y="0" width="660" height="346" rx="0" class="dgm-paper"/><text x="0" y="30" class="dgm-title" text-anchor="start">The credential trust chain</text><rect x="90" y="56" width="480" height="48" rx="0" class="dgm-card"/><text x="108" y="76" class="dgm-title" text-anchor="start">1. Your cloud account</text><text x="108" y="94" class="dgm-label-sm" text-anchor="start">AWS / GCP / Azure — you own it</text><line x1="330" y1="104" x2="330" y2="128" class="dgm-arrow" marker-end="url(#dgmArrow)"/><rect x="90" y="130" width="480" height="48" rx="0" class="dgm-card"/><text x="108" y="150" class="dgm-title" text-anchor="start">2. Scoped IAM role</text><text x="108" y="168" class="dgm-label-sm" text-anchor="start">External ID, least-privilege policy</text><line x1="330" y1="178" x2="330" y2="202" class="dgm-arrow" marker-end="url(#dgmArrow)"/><rect x="90" y="204" width="480" height="48" rx="0" class="dgm-card"/><text x="108" y="224" class="dgm-title" text-anchor="start">3. ZopNight</text><text x="108" y="242" class="dgm-label-sm" text-anchor="start">Assumes the role, never stores long-lived keys</text><line x1="330" y1="252" x2="330" y2="276" class="dgm-arrow" marker-end="url(#dgmArrow)"/><rect x="90" y="278" width="480" height="48" rx="0" class="dgm-card-blue"/><text x="108" y="298" class="dgm-title" text-anchor="start">4. Read + scoped write</text><text x="108" y="316" class="dgm-label-sm" text-anchor="start">Discovery reads; actions are allowlisted</text>
</svg>